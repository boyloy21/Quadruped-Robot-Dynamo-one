controller_manager:
  ros__parameters:
    # Set the update rate (Hz)
    update_rate: 25

    # Controller for publishing joint states
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Controllers for the Front Left (FL) Leg ------------------------------
    FL_hip_joint_controller:
      type: effort_controllers/JointPositionController
      joint: FL_hip_joint
      pid: {p: 105.0, i: 0.5, d: 4.5}

    FL_thigh_joint_controller:
      type: effort_controllers/JointPositionController
      joint: FL_thigh_joint
      pid: {p: 105.0, i: 0.5, d: 4.5}

    FL_calf_joint_controller:
      type: effort_controllers/JointPositionController
      joint: FL_calf_joint
      pid: {p: 105.0, i: 0.5, d: 4.5}

    # Controllers for the Front Right (FR) Leg ------------------------------
    FR_hip_joint_controller:
      type: effort_controllers/JointPositionController
      joint: FR_hip_joint
      pid: {p: 105.0, i: 0.5, d: 4.5}

    FR_thigh_joint_controller:
      type: effort_controllers/JointPositionController
      joint: FR_thigh_joint
      pid: {p: 105.0, i: 0.5, d: 4.5}

    FR_calf_joint_controller:
      type: effort_controllers/JointPositionController
      joint: FR_calf_joint
      pid: {p: 105.0, i: 0.5, d: 4.5}

    # Controllers for the Rear Right (RR) Leg ------------------------------
    RR_hip_joint_controller:
      type: effort_controllers/JointPositionController
      joint: RR_hip_joint
      pid: {p: 105.0, i: 0.5, d: 4.5}

    RR_thigh_joint_controller:
      type: effort_controllers/JointPositionController
      joint: RR_thigh_joint
      pid: {p: 105.0, i: 0.5, d: 4.5}

    RR_calf_joint_controller:
      type: effort_controllers/JointPositionController
      joint: RR_calf_joint
      pid: {p: 105.0, i: 0.5, d: 4.5}

    # Controllers for the Rear Left (RL) Leg ------------------------------
    RL_hip_joint_controller:
      type: effort_controllers/JointPositionController
      joint: RL_hip_joint
      pid: {p: 105.0, i: 0.5, d: 4.5}

    RL_thigh_joint_controller:
      type: effort_controllers/JointPositionController
      joint: RL_thigh_joint
      pid: {p: 105.0, i: 0.5, d: 4.5}

    RL_calf_joint_controller:
      type: effort_controllers/JointPositionController
      joint: RL_calf_joint
      pid: {p: 105.0, i: 0.5, d: 4.5}
